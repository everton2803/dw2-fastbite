services:
  nodejs:
    build: .
    container_name: fastbite_node
    volumes: 
      - ./index.js:/app/index.js
    expose:
      - '3000'
    networks:
      - fastbite_net

  nginx:
    image: nginx:alpine
    container_name: fastbite_nginx
    #depends_on:
    #  - nodejs
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - fastbite_net

networks:
  fastbite_net:
    driver: bridge
